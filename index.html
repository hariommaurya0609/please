<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Valentine 💘</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
      }

      /* ── Card ── */
      .card {
        background: #fff;
        padding: 44px 52px;
        border-radius: 24px;
        text-align: center;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.22);
        position: relative;
        z-index: 10;
        max-width: 440px;
        width: 90%;
        overflow: visible;
      }

      .character {
        font-size: 66px;
        margin-bottom: 16px;
        display: block;
      }

      h1 {
        color: #ff4d6d;
        font-size: 26px;
        margin-bottom: 10px;
        font-weight: 700;
      }

      .subtitle {
        color: #888;
        font-size: 15px;
        margin-bottom: 32px;
        line-height: 1.5;
      }

      /* ── GIF display ── */
      .gif-wrap {
        margin-bottom: 18px;
      }

      .gif-wrap img {
        height: 200px;
        border-radius: 14px;
        object-fit: cover;
        box-shadow: 0 8px 24px rgba(255, 77, 109, 0.2);
      }

      /* ── YES bounce (initial attention-grabber) ── */
      @keyframes bounce {
        0%,
        20%,
        50%,
        80%,
        100% {
          transform: translateY(0);
        }
        40% {
          transform: translateY(-14px);
        }
        60% {
          transform: translateY(-7px);
        }
      }

      .bounce {
        animation: bounce 2s ease infinite;
      }

      /* ── Final success GIF ── */
      .final-gif {
        height: 200px;
        border-radius: 16px;
        object-fit: cover;
        margin-bottom: 20px;
        animation: floatTeddy 3s ease-in-out infinite;
        filter: drop-shadow(0 12px 24px rgba(0, 0, 0, 0.18));
      }

      /* ── Button row ── */
      .btn-row {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 16px;
        min-height: 60px;
        overflow: visible;
      }

      button {
        padding: 13px 30px;
        font-size: 17px;
        font-weight: 700;
        border: none;
        border-radius: 14px;
        cursor: pointer;
        white-space: nowrap;
        transition: box-shadow 0.2s ease;
      }

      button:hover {
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
      }

      #yesBtn {
        background: linear-gradient(135deg, #ff4d6d, #ff758c);
        color: #fff;
        transform-origin: center;
        transition:
          transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
          box-shadow 0.2s ease;
        position: relative;
        z-index: 20;
      }

      #noBtn {
        background: #e9ecef;
        color: #555;
        flex-shrink: 0;
      }

      /* ── Shake ── */
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0) rotate(0deg);
        }
        10% {
          transform: translateX(-7px) rotate(-4deg);
        }
        25% {
          transform: translateX(7px) rotate(4deg);
        }
        40% {
          transform: translateX(-9px) rotate(-5deg);
        }
        55% {
          transform: translateX(9px) rotate(5deg);
        }
        70% {
          transform: translateX(-5px) rotate(-3deg);
        }
        85% {
          transform: translateX(5px) rotate(3deg);
        }
      }

      .shake {
        animation: shake 0.45s ease infinite;
      }

      /* ── Particles ── */
      .particle {
        position: fixed;
        pointer-events: none;
        z-index: 9999;
        transform-origin: center;
        animation: particleFly 0.9s ease-out forwards;
      }

      @keyframes particleFly {
        0% {
          opacity: 1;
          transform: translate(0, 0) scale(1.2);
        }
        100% {
          opacity: 0;
          transform: translate(var(--tx), var(--ty)) scale(0.2);
        }
      }

      /* ── GitHub share button (final screen) ── */
      #githubBtn {
        position: absolute;
        top: 18px;
        right: 20px;
        background: rgba(255, 255, 255, 0.22);
        color: #fff;
        border: 2px solid rgba(255, 255, 255, 0.5);
        border-radius: 12px;
        padding: 8px 14px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
        backdrop-filter: blur(4px);
        transition:
          background 0.2s ease,
          transform 0.2s ease;
        white-space: nowrap;
      }

      #githubBtn:hover {
        background: rgba(255, 255, 255, 0.38);
        transform: scale(1.05);
      }

      /* ── Final screen ── */
      #finalScreen {
        position: fixed;
        inset: 0;
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(
          145deg,
          #ff4d6d 0%,
          #ff758c 40%,
          #ffb3c6 100%
        );
        z-index: 2000;
        color: #fff;
        text-align: center;
        padding: 32px;
      }

      #finalScreen.show {
        display: flex;
        animation: fadeScaleIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      @keyframes fadeScaleIn {
        from {
          opacity: 0;
          transform: scale(0.85);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .final-teddy {
        font-size: 96px;
        margin-bottom: 20px;
        animation: floatTeddy 3s ease-in-out infinite;
        filter: drop-shadow(0 12px 24px rgba(0, 0, 0, 0.18));
      }

      @keyframes floatTeddy {
        0%,
        100% {
          transform: translateY(0) rotate(-4deg) scale(1);
        }
        50% {
          transform: translateY(-20px) rotate(4deg) scale(1.05);
        }
      }

      .final-title {
        font-size: 42px;
        font-weight: 800;
        margin-bottom: 16px;
        text-shadow: 0 2px 16px rgba(0, 0, 0, 0.2);
      }

      .final-msg {
        font-size: 18px;
        line-height: 1.7;
        max-width: 380px;
        opacity: 0.93;
        margin-bottom: 28px;
      }

      .final-icons {
        font-size: 34px;
        letter-spacing: 10px;
      }

      /* ── Floating hearts ── */
      .heart {
        position: fixed;
        pointer-events: none;
        z-index: 1999;
        animation: floatHeart linear forwards;
      }

      @keyframes floatHeart {
        0% {
          transform: translateY(0) rotate(var(--r)) scale(1);
          opacity: 1;
        }
        100% {
          transform: translateY(-110vh) rotate(calc(var(--r) + 180deg))
            scale(1.5);
          opacity: 0;
        }
      }

      /* ── Confetti ── */
      .confetti {
        position: fixed;
        pointer-events: none;
        z-index: 1998;
        border-radius: 2px;
        animation: confettiFall linear forwards;
      }

      @keyframes confettiFall {
        0% {
          transform: translateY(-20px) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateY(110vh) rotate(800deg);
          opacity: 0.1;
        }
      }
    </style>
  </head>
  <body>
    <!-- ── Main card ── -->
    <div class="card">
      <div class="gif-wrap">
        <img
          id="gifDisplay"
          src="https://cdn.jsdelivr.net/gh/CodeKageHQ/Ask-out-your-Valentine@588f7d920751b6ba9e0e7babecc8904fc467a595/images/image1.gif"
          alt="Cute kitten with flowers"
        />
      </div>
      <h1><span id="nameDisplay"></span>, kya aap meri Valentine banoge? 💘</h1>
      <p class="subtitle">Thoda sa time do, dil meri baat sun lo… 🥹</p>
      <div class="btn-row" id="btnRow">
        <button id="yesBtn" class="bounce">Haan ji! 💖</button>
        <button id="noBtn">Nahi 😒</button>
      </div>
    </div>

    <!-- ── Final romantic screen ── -->
    <div id="finalScreen">
      <a
        id="githubBtn"
        href="#"
        target="_blank"
        rel="noopener noreferrer"
        title="Want to send this to your special someone too? 😏"
        >😏 Want to steal this?</a
      >
      <img
        class="final-gif"
        src="https://cdn.jsdelivr.net/gh/CodeKageHQ/Ask-out-your-Valentine@588f7d920751b6ba9e0e7babecc8904fc467a595/images/image7.gif"
        alt="Happy kitten celebrating"
      />
      <div class="final-title">
        <span id="nameFinal"></span> ne haan bola! 💘
      </div>
      <p class="final-msg">
        Dekha! Mujhe pata tha tum "haan" bologe 😌💫<br />
        Ab tum officially meri Valentine ho, no take-backs! 🎉<br />
        Tumse pyaar karna meri sabse acchi hobby hai ❤️
      </p>
      <div class="final-icons">✨💖🎉💫❤️</div>
    </div>

    <script>
      "use strict";

      // ── 🔧 CHANGE THIS to your GitHub Pages / repo URL ─────────────────────
      const GITHUB_URL = "https://github.com/hariommaurya0609/please";

      const yesBtn = document.getElementById("yesBtn");
      const noBtn = document.getElementById("noBtn");
      const gifDisplay = document.getElementById("gifDisplay");

      // ── Image sequence (jsDelivr CDN, no local files needed) ───────────────
      const BASE =
        "https://cdn.jsdelivr.net/gh/CodeKageHQ/Ask-out-your-Valentine@588f7d920751b6ba9e0e7babecc8904fc467a595/images/";
      const IMAGES = [
        BASE + "image1.gif", // initial — happy kitten
        BASE + "image2.gif", // click 1
        BASE + "image3.gif", // click 2
        BASE + "image4.gif", // click 3 (chaos activates)
        BASE + "image5.gif", // click 4
        BASE + "image6.gif", // click 5+ (STOP)
        BASE + "image7.gif", // YES screen — celebration
      ];

      // ── State ──────────────────────────────────────────────────────────────
      let noClicks = 0;
      let yesScale = 1;
      let chaosMode = false;

      // Physics
      let noX = 0,
        noY = 0;
      let velX = 0,
        velY = 0;
      let curX = -9999,
        curY = -9999;
      let rafId = null;

      const FRICTION = 0.8;
      const REPEL_DIST = 160;
      const REPEL_STR = 18;
      const DEADZONE = 0.15;

      // NO button messages — escalating desperation
      // ── Name from URL query param (?name=Kiran) ──────────────────────────
      const params = new URLSearchParams(window.location.search);
      const name = (params.get("name") || "Jaanu").trim();
      const nameJi = name;

      document.querySelectorAll("#nameDisplay, #nameFinal").forEach((el) => {
        el.textContent = nameJi;
      });

      document.title = nameJi + " ki Valentine 💘";

      const noLabels = [
        "Nahi 😒", // 0 – initial
        "Sach mein? 🥺", // after click 1
        `${nameJi}… please 😢`, // after click 2
        `${nameJi}… please 😢`, // after click 3 — chaos activates
        "Dil tod diya tumne 💔", // after click 4
        "Ruk jao! Rona aa jayega 😭💔", // after click 5+
      ];

      // ── NO button: click ───────────────────────────────────────────────────
      noBtn.addEventListener("click", () => {
        noClicks++;

        noBtn.textContent = noLabels[Math.min(noClicks, noLabels.length - 1)];

        // Swap to matching sad GIF
        if (gifDisplay)
          gifDisplay.src = IMAGES[Math.min(noClicks, IMAGES.length - 2)];

        // YES button grows
        yesScale = Math.min(yesScale + 0.28, 3.2);
        yesBtn.style.transform = `scale(${yesScale})`;

        // Activate physics chaos on 3rd click
        if (noClicks === 3) activateChaos();

        // Dramatic shake once STOP is reached
        if (noClicks >= 5) noBtn.classList.add("shake");
      });

      // ── Chaos mode ─────────────────────────────────────────────────────────
      function activateChaos() {
        chaosMode = true;

        const rect = noBtn.getBoundingClientRect();
        noX = rect.left;
        noY = rect.top;

        // Detach from card flow → fixed positioning
        Object.assign(noBtn.style, {
          position: "fixed",
          left: noX + "px",
          top: noY + "px",
          margin: "0",
          zIndex: "500",
        });

        rafId = requestAnimationFrame(physicsLoop);
      }

      function physicsLoop() {
        const bw = noBtn.offsetWidth;
        const bh = noBtn.offsetHeight;
        const cx = noX + bw / 2;
        const cy = noY + bh / 2;

        const dx = cx - curX;
        const dy = cy - curY;
        const dist = Math.hypot(dx, dy);

        // Smooth magnetic repulsion from cursor
        if (dist < REPEL_DIST && dist > 1) {
          const t = (REPEL_DIST - dist) / REPEL_DIST;
          const force = t * t * REPEL_STR;
          velX += (dx / dist) * force;
          velY += (dy / dist) * force;
        }

        const pad = 8;
        const maxX = window.innerWidth - bw - pad;
        const maxY = window.innerHeight - bh - pad;

        // Wall repulsion — pushes button away from all four edges
        const WALL_DIST = 100;
        const WALL_STR = 10;
        const distL = noX - pad;
        const distR = maxX - noX;
        const distT = noY - pad;
        const distB = maxY - noY;
        if (distL < WALL_DIST)
          velX += Math.pow((WALL_DIST - distL) / WALL_DIST, 2) * WALL_STR;
        if (distR < WALL_DIST)
          velX -= Math.pow((WALL_DIST - distR) / WALL_DIST, 2) * WALL_STR;
        if (distT < WALL_DIST)
          velY += Math.pow((WALL_DIST - distT) / WALL_DIST, 2) * WALL_STR;
        if (distB < WALL_DIST)
          velY -= Math.pow((WALL_DIST - distB) / WALL_DIST, 2) * WALL_STR;

        // Friction
        velX *= FRICTION;
        velY *= FRICTION;

        // Dead-zone — stop micro-drift
        if (Math.abs(velX) < DEADZONE) velX = 0;
        if (Math.abs(velY) < DEADZONE) velY = 0;

        noX += velX;
        noY += velY;

        // Hard clamp — last-resort safety net only
        if (noX < pad) {
          noX = pad;
          velX = Math.abs(velX) * 0.8;
        }
        if (noX > maxX) {
          noX = maxX;
          velX = -Math.abs(velX) * 0.8;
        }
        if (noY < pad) {
          noY = pad;
          velY = Math.abs(velY) * 0.8;
        }
        if (noY > maxY) {
          noY = maxY;
          velY = -Math.abs(velY) * 0.8;
        }

        noBtn.style.left = noX + "px";
        noBtn.style.top = noY + "px";

        rafId = requestAnimationFrame(physicsLoop);
      }

      // ── Pointer / touch tracking ────────────────────────────────────────────
      document.addEventListener("mousemove", (e) => {
        curX = e.clientX;
        curY = e.clientY;
      });

      document.addEventListener(
        "touchmove",
        (e) => {
          if (e.touches.length) {
            curX = e.touches[0].clientX;
            curY = e.touches[0].clientY;
          }
        },
        { passive: true },
      );

      // Reset cursor after touch ends so the button drifts to a stop naturally
      document.addEventListener(
        "touchend",
        () => {
          curX = -9999;
          curY = -9999;
        },
        { passive: true },
      );

      // ── YES button: click ───────────────────────────────────────────────────
      yesBtn.addEventListener("click", () => {
        yesBtn.classList.remove("bounce");
        if (rafId) cancelAnimationFrame(rafId);
        spawnParticles(yesBtn);
        fireHeartConfetti();
        setTimeout(showFinalScreen, 700);
      });

      // ── Canvas-confetti heart burst ─────────────────────────────────────────
      function fireHeartConfetti() {
        if (typeof confetti === "undefined") return;
        const heart = confetti.shapeFromPath({
          path: "M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z",
        });
        const defaults = {
          spread: 360,
          ticks: 100,
          gravity: 0,
          decay: 0.94,
          startVelocity: 20,
          shapes: [heart],
          colors: ["#ff69b4", "#ff1493", "#ff6b81", "#e84393", "#ff4d6d"],
        };
        confetti({ ...defaults, particleCount: 50, scalar: 2 });
        confetti({ ...defaults, particleCount: 25, scalar: 3 });
        confetti({ ...defaults, particleCount: 10, scalar: 4 });
      }

      // ── Sparkle / party burst ───────────────────────────────────────────────
      function spawnParticles(btn) {
        const rect = btn.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const emojis = ["✨", "🎉", "💖", "💫", "❤️", "🌸", "🥳", "🎊"];
        const count = 32;

        for (let i = 0; i < count; i++) {
          const el = document.createElement("span");
          el.className = "particle";
          el.textContent = emojis[i % emojis.length];

          const angle = (i / count) * 2 * Math.PI + (Math.random() - 0.5) * 0.5;
          const dist = 90 + Math.random() * 160;
          const tx = Math.cos(angle) * dist;
          const ty = Math.sin(angle) * dist - 40;

          el.style.left = cx + "px";
          el.style.top = cy + "px";
          el.style.fontSize = 15 + Math.random() * 14 + "px";
          el.style.setProperty("--tx", tx + "px");
          el.style.setProperty("--ty", ty + "px");
          el.style.animationDelay = Math.random() * 0.1 + "s";

          document.body.appendChild(el);
          el.addEventListener("animationend", () => el.remove(), {
            once: true,
          });
        }
      }

      // ── Final romantic screen ───────────────────────────────────────────────
      function showFinalScreen() {
        const screen = document.getElementById("finalScreen");
        document.getElementById("githubBtn").href = GITHUB_URL;
        screen.classList.add("show");
        setTimeout(fireHeartConfetti, 500); // second heart burst on reveal
        spawnHearts();
        spawnConfetti();
      }

      function spawnHearts() {
        const picks = ["💖", "💗", "💓", "💘", "❤️", "🌸", "💝"];
        let n = 0;
        const iv = setInterval(() => {
          if (n++ > 65) {
            clearInterval(iv);
            return;
          }
          const el = document.createElement("span");
          el.className = "heart";
          el.textContent = picks[Math.floor(Math.random() * picks.length)];
          el.style.setProperty("--r", Math.random() * 60 - 30 + "deg");
          el.style.left = Math.random() * 100 + "vw";
          el.style.bottom = "-40px";
          el.style.fontSize = 14 + Math.random() * 20 + "px";
          el.style.animationDuration = 3 + Math.random() * 4 + "s";
          document.body.appendChild(el);
          el.addEventListener("animationend", () => el.remove(), {
            once: true,
          });
        }, 140);
      }

      function spawnConfetti() {
        const cols = [
          "#ff4d6d",
          "#ff758c",
          "#ffb3c6",
          "#fff",
          "#ffd6e0",
          "#ffccd5",
          "#ffc8dd",
        ];
        for (let i = 0; i < 90; i++) {
          setTimeout(() => {
            const el = document.createElement("div");
            el.className = "confetti";
            el.style.left = Math.random() * 100 + "vw";
            el.style.top = "-20px";
            el.style.width = 5 + Math.random() * 9 + "px";
            el.style.height = 10 + Math.random() * 12 + "px";
            el.style.background = cols[Math.floor(Math.random() * cols.length)];
            el.style.transform = `rotate(${Math.random() * 360}deg)`;
            el.style.animationDuration = 2.5 + Math.random() * 3 + "s";
            document.body.appendChild(el);
            el.addEventListener("animationend", () => el.remove(), {
              once: true,
            });
          }, i * 35);
        }
      }
    </script>
  </body>
</html>
